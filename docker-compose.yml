# ローカル開発用インフラ（PostgreSQL / Redis）
# アプリ本体 (apps/web, apps/api) は `pnpm dev` でホスト上に直接起動する。
# 使い方: docker compose up -d  →  pnpm install && pnpm dev
name: yakuji-shonin-support

services:
  postgres:
    image: ankane/pgvector:v0.5.1
    container_name: yakuji-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: yakuji_dev
    ports:
      - "5432:5432"
    volumes:
      - yakuji_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: yakuji-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - yakuji_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  yakuji_postgres_data:
  yakuji_redis_data:
