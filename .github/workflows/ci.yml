name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.15.0"

jobs:
  lint-typecheck-build:
    name: Lint / Typecheck / Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @yakuji/api exec prisma generate

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  test:
    name: Unit / E2E Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: ankane/pgvector:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: yakuji_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/yakuji_test?schema=public
      REDIS_URL: redis://localhost:6379
      CORS_ORIGIN: http://localhost:3000
      API_PREFIX: api/v1
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @yakuji/api exec prisma generate

      - name: Run migrations
        run: pnpm --filter @yakuji/api exec prisma migrate deploy

      - name: Unit tests
        run: pnpm test

      - name: API e2e tests
        run: pnpm --filter @yakuji/api test:e2e

  security-audit:
    name: Security Audit (dependency vulnerabilities)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 本番依存(--prod)のhigh重度脆弱性は2026-07-08時点で0件（multer/lodashのpin、bcrypt→bcryptjs
      # 置換で解消済み、PR #41/#42）。本番runtimeへの実害基準としてここをブロッキングにする。
      - name: pnpm audit --prod (high severity, blocking)
        run: pnpm audit --prod --audit-level=high

      # devDependencies側は将来的にも高頻度で新規CVEが公開されうる（ビルド/テストツールの推移依存、
      # 本番runtimeには同梱されない）。ブロッキングにすると無関係な理由でCIが頻繁に赤くなるため、
      # 可視化のみの非ブロッキングとして維持する。
      - name: pnpm audit (all deps incl. dev, high severity, non-blocking)
        run: pnpm audit --audit-level=high
        continue-on-error: true
